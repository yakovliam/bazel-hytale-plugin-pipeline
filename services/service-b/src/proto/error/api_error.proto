syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.myapplication.serviceb.api.proto";

message ApiError {
  // The error code
  string code = 1;
  // The error message
  string message = 2;
  // The HTTP status code
  int32 status = 3;
  // Optional additional data
  map<string, string> details = 4;
}
